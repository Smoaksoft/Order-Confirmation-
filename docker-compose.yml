version: '3.8'

services:
  # Nginx Gateway Reverse Proxy
  nginx:
    image: nginx:stable-alpine
    container_name: ordervoice-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: always

  # Primary Full-Stack Express / Node Engine
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ordervoice-app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://ordervoice_user:secure_pwd_9918@postgres:5432/ordervoice_db
      - REDIS_URL=redis://redis:6379/0
    expose:
      - "3000"
    depends_on:
      - postgres
      - redis
    restart: always

  # PostgreSQL Relational Database Service
  postgres:
    image: postgres:16-alpine
    container_name: ordervoice-postgres
    environment:
      POSTGRES_USER: ordervoice_user
      POSTGRES_PASSWORD: secure_pwd_9918
      POSTGRES_DB: ordervoice_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  # Redis distributed cluster cache
  redis:
    image: redis:7-alpine
    container_name: ordervoice-redis
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    restart: always

  # Celery Asynchronous Voice Call Scheduler Worker
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ordervoice-celery-worker
    command: npx tsx -e "console.log('Celery worker running... Polling Redis task queues.')"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://ordervoice_user:secure_pwd_9918@postgres:5432/ordervoice_db
    depends_on:
      - redis
    restart: always

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
