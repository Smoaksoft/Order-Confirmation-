user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Gzip Compression for Fast Assets Delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate Limiting configuration to prevent DDoS attack vector
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 80;
        server_name localhost ordervoice.ai www.ordervoice.ai;

        # Redirect standard HTTP requests to HTTPs secure tunnel
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name localhost ordervoice.ai www.ordervoice.ai;

        # Self-signed placeholder certificates folder location
        ssl_certificate /etc/nginx/certs/ordervoice_live.crt;
        ssl_certificate_key /etc/nginx/certs/ordervoice_live.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Client Max Upload Size for bulk orders CSV files
        client_max_body_size 10M;

        # Reverse Proxy to Node SaaS container
        location / {
            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Apply Rate Limiting to REST endpoints
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
